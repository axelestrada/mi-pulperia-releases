    <!-- Tailwind CSS CDN -->

    <!-- Lucide Icons -->

    <style>
        /* Patrón de cuadrícula tenue de fondo */
        .bg-grid-pattern {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(to right, rgba(203, 213, 225, 0.35) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(203, 213, 225, 0.35) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        /* Suave resplandor azulado de fondo */
        .bg-radial-glow {
            background: radial-gradient(circle at 50% 35%, rgba(224, 242, 254, 0.8) 0%, rgba(248, 250, 252, 0) 70%);
        }
    </style>
</head>

    <!-- Contenido Principal Centrado -->

        <!-- Contenedor con la imagen -->
        <div class="relative w-full max-w-3xl my-auto transition-transform duration-500 hover:scale-[1.01] flex justify-center">
            <img 
                src="https://i.ibb.co/ynWS3Xvz/mi-pulperia.png" 
                alt="Punto de venta Mi Pulpería" 
                class="w-full h-auto object-contain max-h-[55vh] sm:max-h-[60vh] drop-shadow-2xl"
            />
        </div>

        <!-- Botón de Descarga directa para Windows -->
        <div class="my-auto pt-2 pb-4 text-center">
            <a 
                href="https://github.com/axelestrada/mi-pulperia-releases/releases/download/v0.28.0/mi-pulperia-setup-0.28.0.exe" 
                target="_blank"
                class="inline-flex items-center gap-3 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold text-base sm:text-lg px-8 py-3.5 rounded-2xl shadow-xl shadow-blue-500/25 transition-all duration-200 transform hover:-translate-y-0.5"
            >
                <i data-lucide="download" class="w-5 h-5"></i>
                <span>Descargar para Windows</span>
            </a>
            <p class="text-xs text-slate-400 mt-2 flex items-center justify-center gap-1.5 font-medium">
                <i data-lucide="monitor" class="w-3.5 h-3.5 text-slate-400"></i>
